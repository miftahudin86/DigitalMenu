version: '3.8'

services:
  web:
    build: .
    container_name: digitalmenu_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    environment:
      # Variabel lingkungan untuk CodeIgniter 4
      - CI_ENVIRONMENT=development
      - app.baseURL=http://localhost:8080/
      - database.default.hostname=db
      - database.default.database=digital_menu
      - database.default.username=root
      - database.default.password=rootpassword
      - database.default.DBDriver=MySQLi
    depends_on:
      - db
    networks:
      - app-network

  db:
    image: mysql:8.0
    container_name: digitalmenu_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=digital_menu
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - app-network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: digitalmenu_pma
    ports:
      - "8081:80"
    environment:
      - PMA_HOST=db
      - PMA_PORT=3306
      - PMA_USER=root
      - PMA_PASSWORD=rootpassword
    depends_on:
      - db
    networks:
      - app-network

volumes:
  db_data:

networks:
  app-network:
    driver: bridge
